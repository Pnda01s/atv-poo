  # ════════════════ WEBSOCKET ════════════════
  /ws:
    get:
      tags: [WebSocket]
      summary: "Conexão WebSocket"
      description: |
        Endpoint WebSocket para comunicação em tempo real.
        Conectar via: `ws://host:port/ws?token=JWT_ACCESS_TOKEN`

        **Rooms disponíveis:**
        - `user:{userId}` — eventos pessoais
        - `instituicao:{id}` — eventos da instituição
        - `fila:{filaId}` — eventos da fila

        **Mensagens de controle:**
        - Join: `{ "action": "join", "room": "fila:abc123" }`
        - Leave: `{ "action": "leave", "room": "fila:abc123" }`

        **Eventos emitidos:**
        `senha:criada`, `senha:chamada`, `senha:finalizada`, `senha:atualizada`,
        `fila:criada`, `fila:atualizada`, `fila:removida`,
        `qrcode:novo`, `qrcode:regenerado`
      parameters:
        - name: token
          in: query
          required: true
          schema:
            type: string
          description: "JWT access token"
      responses:
        "101":
          description: "WebSocket upgrade"
        "401":
          description: "Token inválido"
