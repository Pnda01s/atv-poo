# ╔══════════════════════════════════════════════════════════════╗
# ║  FilaCidadã API — Docker Compose de deploy remoto           ║
# ║                                                              ║
# ║  Diferença do docker-compose.yml (dev):                     ║
# ║  → usa Dockerfile.deploy (sem estágio de build Gradle)      ║
# ║  → o fat JAR é copiado do build/libs/ enviado via rsync     ║
# ╚══════════════════════════════════════════════════════════════╝

services:

  # ── API ─────────────────────────────────────────────────────────
  api:
    build:
      context: .
      dockerfile: Dockerfile.deploy
    image: filacidada-api:latest
    container_name: filacidada-api
    restart: unless-stopped
    ports:
      - "${PORT:-7351}:${PORT:-7351}"
    environment:
      PORT:          ${PORT:-7351}
      MONGO_URI:     ${MONGO_URI}
      MONGO_DB:      ${MONGO_DB:-filacidada}
      JWT_SECRET:    ${JWT_SECRET}
      MAIL_ENABLED:  ${MAIL_ENABLED:-false}
      MAIL_HOST:     ${MAIL_HOST:-smtp.gmail.com}
      MAIL_PORT:     ${MAIL_PORT:-587}
      MAIL_USER:     ${MAIL_USER:-}
      MAIL_PASSWORD: ${MAIL_PASSWORD:-}
      MAIL_FROM:     ${MAIL_FROM:-}
      MAIL_TLS:      ${MAIL_TLS:-true}
    networks:
      - filacidada-net
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:${PORT:-7351}/health || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 20s

# ── Rede ────────────────────────────────────────────────────────────
networks:
  filacidada-net:
    driver: bridge
